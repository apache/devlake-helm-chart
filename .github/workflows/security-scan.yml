name: Security Scan

on:
  pull_request:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC

permissions:
  contents: read
  security-events: write

jobs:
  trivy-config-scan:
    name: Trivy Chart Configuration Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: 'charts/devlake'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'  # Fail on HIGH/CRITICAL findings (enforcement mode)

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  kubescape-scan:
    name: Kubescape Security Best Practices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Install tools via mise
        run: mise install

      - name: Add Helm repos
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Build chart dependencies
        run: |
          helm dependency build charts/devlake

      - name: Template Helm chart
        run: |
          ENCRYPTION_SECRET=$(openssl rand -base64 2000 | tr -dc '[:upper:]' | fold -w 128 | head -n 1)
          DB_PASSWORD=$(openssl rand -base64 32)
          DB_ROOT_PASSWORD=$(openssl rand -base64 32)

          helm template devlake charts/devlake \
            --set lake.encryptionSecret.secret="${ENCRYPTION_SECRET}" \
            --set database.password="${DB_PASSWORD}" \
            --set database.mysql.rootPassword="${DB_ROOT_PASSWORD}" \
            > rendered-manifests.yaml

      - name: Run Kubescape scan
        uses: kubescape/github-action@v3.0.21
        with:
          format: sarif
          outputFile: kubescape-results.sarif
          files: rendered-manifests.yaml
          # Enforcement mode enabled: scan will fail on security violations

      - name: Upload Kubescape results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'kubescape-results.sarif'
