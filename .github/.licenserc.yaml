header:
  license:
    spdx-id: Apache-2.0
    copyright-owner: Apache Software Foundation

  paths-ignore:
    - '**/*.md'
    - '**/*.json'
    - '**/*.txt'
    - '**/LICENSE'
    - '**/NOTICE'
    - '.gitignore'
    - '.gitmodules'
    - 'charts/**/charts/**'
    - 'charts/**/Chart.lock'
    - '.github/.licenserc.yaml'
    - '.github/dependabot.yml'
    - '.github/labeler.yml'
    - '.github/actions/**/action.yml'
    - '.licenserc.yaml'
    - '.mise.toml'
    - '.pre-commit-config.yaml'
    - '.yamllint'
    - '**/*.gotmpl'

  comment: on-failure
